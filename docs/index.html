				<p><strong>Meshbex</strong> is a free, web-based 3D CAD explorer, assembly workflow editor and document editor built with Three.js.</p>
				<p>Load STL and GLTF/GLB models directly in your browser to explore their structure, create documentation, build step-by-step animated assembly instructions, take cross-sections and measurements, and export self-contained interactive HTML presentations.</p>
